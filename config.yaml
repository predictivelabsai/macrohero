app:
  name: "MacroHero"
  port: 5030
  theme: "blue"
  sse_interval_seconds: 20
  fetch_interval_seconds: 300

event_categories:
  - name: Central Bank
    slug: central-bank
    icon: landmark
    color: "#ef4444"
    display_order: 1
    keywords: ["central bank", "fed", "ecb", "boe", "boj", "interest rate", "monetary policy", "rate decision", "quantitative", "tightening", "dovish", "hawkish", "fomc", "rate cut", "rate hike"]
  - name: Earnings
    slug: earnings
    icon: bar-chart-2
    color: "#3b82f6"
    display_order: 2
    keywords: ["earnings", "revenue", "profit", "quarterly results", "financial results", "eps", "guidance", "beat estimates", "missed estimates"]
  - name: GDP & Growth
    slug: gdp
    icon: trending-up
    color: "#10b981"
    display_order: 3
    keywords: ["gdp", "growth", "recession", "economic expansion", "contraction", "pmi", "manufacturing", "services pmi", "economic outlook"]
  - name: Trade & Tariffs
    slug: trade
    icon: globe
    color: "#f59e0b"
    display_order: 4
    keywords: ["trade", "tariff", "import", "export", "sanctions", "trade war", "trade deal", "trade deficit", "trade surplus", "protectionism"]
  - name: Employment
    slug: employment
    icon: users
    color: "#8b5cf6"
    display_order: 5
    keywords: ["employment", "jobs", "unemployment", "nonfarm", "payroll", "labor", "jobless claims", "hiring", "layoffs", "wage growth"]
  - name: Inflation
    slug: inflation
    icon: flame
    color: "#ec4899"
    display_order: 6
    keywords: ["inflation", "cpi", "ppi", "deflation", "price index", "consumer prices", "core inflation", "disinflation", "stagflation"]
  - name: Geopolitical
    slug: geopolitical
    icon: shield
    color: "#dc2626"
    display_order: 7
    keywords: ["geopolitical", "war", "conflict", "sanctions", "nato", "military", "invasion", "election", "regime", "coup", "diplomacy"]

currency_pairs:
  - pair: EURUSD
    base: EUR
    quote: USD
    yf_ticker: EURUSD=X
  - pair: GBPUSD
    base: GBP
    quote: USD
    yf_ticker: GBPUSD=X
  - pair: USDJPY
    base: USD
    quote: JPY
    yf_ticker: USDJPY=X
  - pair: USDCHF
    base: USD
    quote: CHF
    yf_ticker: USDCHF=X
  - pair: AUDUSD
    base: AUD
    quote: USD
    yf_ticker: AUDUSD=X
  - pair: USDCAD
    base: USD
    quote: CAD
    yf_ticker: USDCAD=X

regions:
  - name: US
    currencies: [USD]
  - name: Europe
    currencies: [EUR, GBP, CHF]
  - name: Asia-Pacific
    currencies: [JPY, AUD, CNY]
  - name: Americas
    currencies: [CAD, MXN, BRL]

sources:
  financial:
    - name: Financial Times
      domain: ft.com
      rss_url: https://www.ft.com/rss/home
      language: en
    - name: Bloomberg
      domain: bloomberg.com
      rss_url: https://feeds.bloomberg.com/markets/news.rss
      language: en
    - name: Wall Street Journal
      domain: wsj.com
      rss_url: https://feeds.a.dj.com/rss/RSSWorldNews.xml
      language: en
    - name: Reuters
      domain: reuters.com
      rss_url: https://www.reutersagency.com/feed/
      language: en
    - name: CNBC
      domain: cnbc.com
      rss_url: https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=10001147
      language: en

scraping:
  default_engine: newspaper4k
  request_timeout_seconds: 15
  max_concurrent_scrapes: 5

search:
  tavily:
    max_results: 10
    search_depth: advanced
    topic: news

llm:
  model: grok-3
  temperature: 0.4
  max_tokens: 2000
  enrichment_model: grok-3
  enrichment_temperature: 0.1
  enable_enrichment: true
  daily_interval_seconds: 86400
  batch_limit: 100

security:
  anon_chat_limit: 3
  chat_rate_limit_max: 10
  chat_rate_limit_window_seconds: 600
