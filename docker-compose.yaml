# Coolify deploy descriptor for macrohero.
#
# Coolify uses Traefik as the reverse proxy. Services listen internally
# on `expose:` ports; Traefik routes the generated FQDNs to them.
# Set Build Pack = "Docker Compose" and Compose File = "docker-compose.yaml"
# in the Coolify application settings.
#
# Magic vars (Coolify fills these automatically):
#   SERVICE_FQDN_API          -> api FQDN (Python service; legacy)
#   SERVICE_FQDN_API_TS_8002  -> api-ts FQDN (TypeScript service; current target,
#                                routed to container port 8002 via Traefik)
#   SERVICE_FQDN_WEB          -> web FQDN
#   SERVICE_URL_API           -> full URL incl. scheme (https://api.<domain>)
#   SERVICE_URL_API_TS        -> full URL incl. scheme (https://api-ts.<domain>)
#   SERVICE_URL_WEB           -> full URL incl. scheme (https://<domain>)
#
# Cutover state: web's NEXT_PUBLIC_API_URL points at SERVICE_URL_API_TS.
# Rollback: change both NEXT_PUBLIC_API_URL references (build arg + env)
# back to ${SERVICE_URL_API} and rebuild web. See docs/MIGRATION_NOTES.md.
#
# Everything else (DATABASE_URL, Clerk keys, etc.) goes in Coolify's
# Environment Variables UI for this application.

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      SERVICE_FQDN_API: ${SERVICE_FQDN_API}
      DATABASE_URL: ${DATABASE_URL}
      CLERK_ISSUER: ${CLERK_ISSUER}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET}
      CORS_ORIGINS: ${SERVICE_URL_WEB}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      MASSIVE_API_KEY: ${MASSIVE_API_KEY}
      MASSIVE_CACHE_DIR: /app/.cache/massive
      TAVILY_API_KEY: ${TAVILY_API_KEY}
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=3).status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  api-ts:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      # Use the port-suffixed magic var so Coolify wires Traefik to route the
      # generated FQDN to the container's 8002 listener (matches how
      # SERVICE_FQDN_API_8000 routes the Python api). Without the port, Coolify
      # defaults to port 80, which the Node server doesn't listen on.
      SERVICE_FQDN_API_TS_8002: ${SERVICE_FQDN_API_TS_8002}
      DATABASE_URL: ${DATABASE_URL}
      CLERK_ISSUER: ${CLERK_ISSUER}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL}
      CORS_ORIGINS: ${SERVICE_URL_WEB}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-pro}
      DEEPSEEK_FLASH_MODEL: ${DEEPSEEK_FLASH_MODEL:-deepseek-v4-flash}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      NUMERICS_URL: http://numerics:8001
      PORT: "8002"
    expose:
      - "8002"
    depends_on:
      numerics:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8002/healthz').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  numerics:
    build:
      context: ./apps/numerics
      dockerfile: Dockerfile
    environment:
      MASSIVE_API_KEY: ${MASSIVE_API_KEY}
      MASSIVE_CACHE_DIR: /app/.cache/massive
    expose:
      - "8001"
    volumes:
      - numerics-cache:/app/.cache/massive
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/healthz', timeout=3).status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/sign-in}
        NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/sign-up}
        NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL:-/chat}
        NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL:-/chat}
        NEXT_PUBLIC_API_URL: ${SERVICE_URL_API}
    environment:
      SERVICE_FQDN_WEB: ${SERVICE_FQDN_WEB}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      NEXT_PUBLIC_API_URL: ${SERVICE_URL_API}
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  numerics-cache:
