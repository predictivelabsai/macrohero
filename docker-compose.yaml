services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5030:5030"
    environment:
      - DB_URL=${DB_URL}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - MASSIVE_API_KEY=${MASSIVE_API_KEY:-}
      - EODHD_API_KEY=${EODHD_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5030/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
