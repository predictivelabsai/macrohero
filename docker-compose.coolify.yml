# Coolify deploy descriptor for macrohero.
#
# Coolify uses Traefik as the reverse proxy. Services listen internally
# on `expose:` ports; Traefik routes the generated FQDNs to them.
# Set Build Pack = "Docker Compose" and Compose File = "docker-compose.coolify.yml"
# in the Coolify application settings.
#
# Magic vars (Coolify fills these automatically):
#   SERVICE_FQDN_API_8000   -> api FQDN, routes to port 8000
#   SERVICE_FQDN_WEB_3000   -> web FQDN, routes to port 3000
#   SERVICE_URL_API_8000    -> full URL incl. scheme (https://api.<domain>)
#
# Everything else (DATABASE_URL, Clerk keys, etc.) goes in Coolify's
# Environment Variables UI for this application.

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      - SERVICE_FQDN_API_8000
      - DATABASE_URL
      - CLERK_ISSUER
      - CLERK_JWKS_URL
      - CLERK_WEBHOOK_SECRET
      - CORS_ORIGINS=${SERVICE_URL_WEB_3000}
      - DEEPSEEK_API_KEY
      - DEEPSEEK_MODEL
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - MASSIVE_API_KEY
      - MASSIVE_CACHE_DIR=/app/.cache/massive
      - TAVILY_API_KEY
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=3).status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/sign-in}
        NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/sign-up}
        NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL:-/dashboard}
        NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL:-/dashboard}
        NEXT_PUBLIC_API_URL: ${SERVICE_URL_API_8000}
    environment:
      - SERVICE_FQDN_WEB_3000
      - CLERK_SECRET_KEY
      - NEXT_PUBLIC_API_URL=${SERVICE_URL_API_8000}
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
